# Chris Pollitt's GitHub site - _config.yml
# Using Minimal Mistakes theme (remote) for GitHub Pages
# Docs: https://mmistakes.github.io/minimal-mistakes/docs/configuration/

remote_theme: "mmistakes/minimal-mistakes@4.27.3"

# Required for Minimal Mistakes on GitHub Pages
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-include-cache  # Required by Minimal Mistakes - also add to Gemfile

# Theme skin: "default", "air", "aqua", "contrast", "dark", "dirt", "mint", "neon", "plum", "sunrise"
minimal_mistakes_skin: "default"

# Site settings
title: "Chris Pollitt's GitHub Site"
email: chris.pollitt@gmail.com
description: "Who I am and some of what I've created."
baseurl: ""
url: "https://chrispollitt.github.io"

# Build settings
markdown: kramdown

# Author profile (shown in sidebar)
author:
  name: "Chris Pollitt"
  avatar: "/assets/images/avatar.jpg"  
  bio: "Coder, Facilitator, Laugher, Philosopher"     # Short bio shown under avatar
  location: "Metro Vancouver, BC"
  links:
    - label: "About"
      icon: "fab fa-fw fa-about"
      url: "https://chrispollitt.github.io/about/"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/christopherpollitt"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/chrispollitt"
    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/watch?v=W0wiSz2KoqA&list=PLeUBBmcqYU_8Q2FG3QUi-O98GCkm4vNwF&pp=sAgC" 

# Footer links
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/christopherpollitt"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/chrispollitt"

# Post defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
